# hsb8 docker services.
# fleetcom-agent migrated from /opt/fleetcom-agent/ on 2026-04-19 (NIX-82).
# homeassistant/mosquitto/watchtower migrated from /home/gb/docker/ (NIX-230,
# NIX-234) — same container names + project so bosun wiring keeps working.
#
# ⚠️ CUTOVER GUARD (until NIX-237 closes): do NOT `docker compose up -d` the
# ha/mosquitto/watchtower services from this file before (a) NIX-236 moved the
# data mounts to /srv/hsb8 and (b) NIX-235 created /run/agenix/hsb8-watchtower-env.
# The live containers still run from /home/gb/docker/docker-compose.yml (same
# project + names) — a premature `up -d` here RECREATES homeassistant/mosquitto
# with EMPTY /srv mounts. fleetcom-agent, pharos-beacon, and HostDash are safe
# to reconcile.
services:
  # Pharos beacon (PHAROS-6) — reports this host's status + nix freshness to
  # pharosd (csb1) every 60s; succeeds the FleetCom bosun agent above.
  pharos-beacon:
    image: ghcr.io/markus-barta/pharos/pharosd:0.1.56@sha256:5f91050cf2d1210dac0e6df3cf52266cf68ef358ca9e4fdc1812236576d0d2d0
    container_name: pharos-beacon
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 256m
    cpus: "0.5"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=1777
    network_mode: host
    user: "1000:1000"
    entrypoint: ["/usr/local/bin/pharos-beacon"]
    healthcheck:
      disable: true
    env_file:
      - /run/agenix/pharos-beacon-hsb8-env
    environment:
      - PHAROS_URL=http://100.64.0.4:8088
      - PHAROS_INTERVAL=60
      - PHAROS_HOSTNAME=hsb8
      - PHAROS_PREFERENCES_FILE=/etc/pharos/host-preferences.json
      - PHAROS_CURRENT_KERNEL_MODULES_DIR=/host/run/current-system/kernel-modules/lib/modules
      - NIXCFG_DIR=/nixcfg
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/nixcfg
    volumes:
      - /home/mba/Code/nixcfg:/nixcfg:ro
      - /etc/NIXOS:/etc/NIXOS:ro
      - /etc/pharos/host-preferences.json:/etc/pharos/host-preferences.json:ro
      - /run/current-system/kernel-modules/lib/modules:/host/run/current-system/kernel-modules/lib/modules:ro
    labels:
      - com.centurylinklabs.watchtower.enable=false
      - com.centurylinklabs.watchtower.scope=weekly

  # hsb8-home — HostDash service landing page for this host. Static HTML/CSS/JS
  # served by nginx on :80, built from markus-barta/hostdash via Nix and mounted
  # read-only from /etc.
  hsb8-home:
    image: nginx:alpine
    container_name: hsb8-home
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=Europe/Vienna
    volumes:
      - /etc/hostdash/hsb8/share/hostdash-hsb8:/usr/share/nginx/html:ro
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - com.centurylinklabs.watchtower.scope=weekly

  # ── Migrated from /home/gb/docker/docker-compose.yml (NIX-234) ────────────
  # Data lives under /srv/hsb8/mounts (neutral path, no user home — NIX-236
  # moves it there before cutover, NIX-237 does the cutover).

  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=Europe/Vienna
    volumes:
      - /srv/hsb8/mounts/homeassistant:/config
      - /run/dbus:/run/dbus:rw
      - /sys/class/bluetooth:/sys/class/bluetooth:ro
    depends_on:
      - mosquitto
    labels:
      - com.centurylinklabs.watchtower.scope=weekly

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - /srv/hsb8/mounts/mosquitto/config:/mosquitto/config
      - /srv/hsb8/mounts/mosquitto/data:/mosquitto/data
      - /srv/hsb8/mounts/mosquitto/log:/mosquitto/log
    labels:
      - com.centurylinklabs.watchtower.scope=weekly

  # Weekly Watchtower — updates all scope=weekly containers Saturday 05:00
  # local. Deliberately NO --label-enable: homeassistant/mosquitto carry only
  # the scope label (matches the pre-migration gb-stack behavior).
  watchtower:
    container_name: watchtower
    image: beatkind/watchtower:latest
    restart: unless-stopped
    command: --schedule "0 0 5 * * 6" --cleanup --scope weekly
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - TZ=Europe/Vienna
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_SCOPE=weekly
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATIONS_HOSTNAME=hsb8
      - WATCHTOWER_NOTIFICATION_TITLE_TAG=🏡
      # FLEET-1397: HTTP API so bosun's "Update agent" button works.
      - WATCHTOWER_HTTP_API_UPDATE=true
      # HTTP_API_UPDATE alone disables --schedule runs ("Periodic runs are
      # not enabled") — this re-enables them alongside the API (NIX-228).
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
    env_file:
      # agenix (NIX-235): provides WATCHTOWER_HTTP_API_TOKEN (must match
      # WATCHTOWER_TOKEN in fleetcom-agent's env) + WATCHTOWER_NOTIFICATION_URL
      # (telegram shoutrrr). Replaces /home/gb/secrets/watchtower.env.
      - /run/agenix/hsb8-watchtower-env
