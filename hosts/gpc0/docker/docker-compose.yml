# gpc0 docker services (Pharos beacon only — FleetCom removed 2026-07-08, FLEET-195).
services:
  # Pharos beacon (PHAROS-6) — reports this host's status + nix freshness to
  # pharosd (csb1) every 60s; succeeds the FleetCom bosun agent above.
  pharos-beacon:
    image: ghcr.io/markus-barta/pharos/pharosd:latest
    container_name: pharos-beacon
    restart: unless-stopped
    network_mode: host
    user: "1000:1000"
    entrypoint: ["/usr/local/bin/pharos-beacon"]
    env_file:
      - /run/agenix/pharos-beacon-gpc0-env
    environment:
      - PHAROS_URL=http://100.64.0.4:8088
      - PHAROS_INTERVAL=60
      - PHAROS_HOSTNAME=gpc0
      - NIXCFG_DIR=/nixcfg
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/nixcfg
    volumes:
      - /home/mba/Code/nixcfg:/nixcfg:ro
      - /etc/NIXOS:/etc/NIXOS:ro
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Watchtower keeps the beacon image current while gpc0 is online. Use interval
  # polling instead of a fixed wall-clock schedule because this desktop can be
  # asleep or powered off during a weekly maintenance window.
  watchtower:
    image: beatkind/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    command: --interval 21600 --label-enable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - TZ=Europe/Vienna
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
