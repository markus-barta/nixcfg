# gpc0 docker services (Pharos beacon only — FleetCom removed 2026-07-08, FLEET-195).
services:
  # Pharos beacon (PHAROS-6) — reports this host's status + nix freshness to
  # pharosd (csb1) every 60s; succeeds the FleetCom bosun agent above.
  pharos-beacon:
    image: ghcr.io/markus-barta/pharos/pharosd:0.1.58@sha256:8eb6bdecddce5951c696e35afacdf5acd70acde0ff08e947e413dbc2e4474666
    container_name: pharos-beacon
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 256m
    cpus: "0.5"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=1777
    network_mode: host
    user: "1000:1000"
    entrypoint: ["/usr/local/bin/pharos-beacon"]
    healthcheck:
      disable: true
    env_file:
      - /run/agenix/pharos-beacon-gpc0-env
    environment:
      - PHAROS_URL=http://100.64.0.4:8088
      - PHAROS_INTERVAL=60
      - PHAROS_HOSTNAME=gpc0
      - NIXCFG_DIR=/nixcfg
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/nixcfg
    volumes:
      - /home/mba/Code/nixcfg:/nixcfg:ro
      - /etc/NIXOS:/etc/NIXOS:ro
    labels:
      - com.centurylinklabs.watchtower.enable=false

  # Retained until the gpc0 teardown is complete. The digest-pinned beacon is
  # deliberately excluded; Pharos release bumps use the reviewed fleet commit.
  watchtower:
    image: beatkind/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    command: --interval 21600 --label-enable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - TZ=Europe/Vienna
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
