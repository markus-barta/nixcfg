# csb1 docker services running OUT-OF-BAND of the FleetCom server.
# (FleetCom server itself stays at /home/mba/docker/fleetcom/ — separate
# compose, separate deploy lifecycle. This file is for sibling sidecars.)
# Migrated from /opt/fleetcom-agent/ on 2026-04-19 (NIX-82).
#
# /opt/fleetcom-agent/.env must contain:
#   FLEETCOM_TOKEN=<host bearer token>
#   WATCHTOWER_TOKEN=<random 20+ chars>            (read by bosun)
#   WATCHTOWER_HTTP_API_TOKEN=<same value>         (read by watchtower)
services:
  # FleetCom Bosun — heartbeats + container lifecycle to https://fleet.barta.cm.
  # FLEETCOM_TOKEN stays in /opt/fleetcom-agent/.env until a follow-up wires
  # the agenix secret (fleetcom-token-csb1) directly.
  fleetcom-agent:
    image: ghcr.io/markus-barta/fleetcom-bosun:latest
    container_name: fleetcom-agent
    restart: unless-stopped
    # mem_limit caps a known leak in bosun (FLEET-78, cs1 outage 2026-04-25).
    # Baseline RSS ~13 MiB; 512m gives ~40× headroom and OOM-kills runaway.
    mem_limit: 512m
    memswap_limit: 512m
    env_file: [/opt/fleetcom-agent/.env]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    environment:
      - FLEETCOM_URL=https://fleet.barta.cm
      - FLEETCOM_HOSTNAME=csb1
      # Dashboard "Update now" → bosun calls watchtower's HTTP API.
      - WATCHTOWER_URL=http://watchtower:8080
    labels:
      - traefik.enable=false
      - com.centurylinklabs.watchtower.enable=true

  # Label-scoped watchtower so the bosun image stays current. Only manages
  # containers carrying com.centurylinklabs.watchtower.enable=true — the
  # FleetCom server compose at /home/mba/docker/fleetcom/ is untouched.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: fleetcom-watchtower
    restart: unless-stopped
    env_file: [/opt/fleetcom-agent/.env]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Pin API version: watchtower's bundled default is too old for modern
      # Docker daemons (host floor is 1.40+). 1.44 matches csb0's pattern.
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_HTTP_API_UPDATE=true
      # Without this, enabling the HTTP API disables the periodic poll
      # (watchtower ≥1.7 behavior). We want both: auto-update daily AND
      # the dashboard's "Update now" trigger.
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
    labels:
      - traefik.enable=false
