# csb1 main docker stack — git-tracked (NIX-110 migration)
#
# Previously at /home/mba/docker/docker-compose.yml; now lives in nixcfg
# matching the csb0 pattern. Deploy with:
#   cd ~/Code/nixcfg/hosts/csb1/docker && docker compose up -d
#
# Project name preserved as `csb1` so all named volumes (csb1_*) and
# networks (csb1_*) survive the cutover without data migration.
#
# Secrets: ALL env_files now use /run/agenix/... paths (M4 migration of
# the loose ~/secrets/ and ./xxx.env files into agenix). Container reads
# at runtime via agenix-decrypted bind. No plaintext secrets in this file.
name: csb1
services:
  docmost-db:
    image: postgres:16-alpine
    env_file:
      - /run/agenix/csb1-docmost-postgres-env
    volumes:
      - docmost_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    labels:
      - traefik.enable=false

  docmost-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - docmost_redis_data:/data
    networks:
      - internal
    labels:
      - traefik.enable=false

  docmost:
    image: docmost/docmost:latest
    restart: unless-stopped
    depends_on:
      - docmost-db
      - docmost-redis
    env_file:
      - /run/agenix/csb1-docmost-config-env
    volumes:
      - docmost_data:/app/data/storage
    networks:
      - internal
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.docmost.rule=Host(`docmost.barta.cm`)
      - traefik.http.routers.docmost.tls.certresolver=default
      - traefik.http.routers.docmost.tls=true
      - traefik.http.services.docmost.loadbalancer.server.port=3000
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.docmost.middlewares=cloudflarewarp@file

  # influxdb + grafana removed 2026-06-12 (NIX-193) — data archived to
  # hsb1:~/archive/NIX-193/ (parquet, DuckDB-readable); tracking now in HA.

  # --- Paperless-ngx Services Begin ---
  paperless-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - /run/agenix/csb1-paperless-postgres-env
    volumes:
      - paperless_db_data:/var/lib/postgresql/data
    networks:
      - internal
    labels:
      - traefik.enable=false

  paperless-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - paperless_redis_data:/data
    networks:
      - internal
    labels:
      - traefik.enable=false

  paperless-tika:
    image: apache/tika:latest # image no longer available here... ghcr.io/paperless-ngx/tika:latest
    restart: unless-stopped
    networks:
      - internal
    labels:
      - traefik.enable=false

  paperless-gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-routes=true"
    networks:
      - internal
    labels:
      - traefik.enable=false

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-redis
      - paperless-tika
      - paperless-gotenberg
    env_file:
      - /run/agenix/csb1-paperless-config-env
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_consume:/usr/src/paperless/consume
    environment:
      - TZ=Europe/Vienna
      - PAPERLESS_TIKA_ENABLED=1
      - PAPERLESS_TIKA_ENDPOINT=http://paperless-tika:9998
      - PAPERLESS_GOTENBERG_ENDPOINT=http://paperless-gotenberg:3000
    networks:
      - internal
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.paperless.rule=Host(`paperless.barta.cm`)
      - traefik.http.routers.paperless.tls.certresolver=default
      - traefik.http.routers.paperless.tls=true
      - traefik.http.services.paperless.loadbalancer.server.port=8000
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.paperless.middlewares=cloudflarewarp@file
  # --- Paperless-ngx Services End ---

  docker-proxy-traefik:
    image: tecnativa/docker-socket-proxy
    environment:
      - CONTAINERS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-sock-traefik
    restart: always
    labels:
      - traefik.enable=false

  # https://docs.traefik.io/v2.5/providers/docker/
  # acme.json lives at ./traefik/acme.json (gitignored — mutable LE cert
  # state). Matches csb0's pattern: relative path, file kept out of git.
  traefik:
    image: traefik
    command: --providers.docker
    restart: always
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
      # - "8883:8883" #todo: enable if mosquitto installed
    networks:
      - traefik
      - docker-sock-traefik
    volumes:
      - ./traefik/static.yml:/etc/traefik/traefik.yml
      - ./traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml
      - ./traefik/acme.json:/etc/traefik/acme/acme.json:rw
    labels:
      - traefik.http.routers.traefik.rule=Host(`cs1.barta.cm`)
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls.certresolver=default
      - traefik.http.routers.traefik.tls=true
      # - traefik.http.routers.traefik.middlewares=authelia  # DISABLED 2026-03-06 - no authelia container
    environment:
      - TZ=Europe/Vienna
    env_file:
      - /run/agenix/traefik-variables

  whoami:
    image: containous/whoami
    networks:
      - traefik
    labels:
      - traefik.http.routers.whoami.rule=Host(`whoami1.barta.cm`)
      - traefik.http.routers.whoami.tls.certresolver=default
      - traefik.http.routers.whoami.tls=true
      - traefik.http.routers.whoami.middlewares=cloudflarewarp@file

  smtp:
    image: namshi/smtp
    restart: always
    networks:
      - traefik
      - smtp
    environment:
      - TZ=Europe/Vienna
      - SMARTHOST_ADDRESS=mail.hover.com
      - SMARTHOST_PORT=587
      - SMARTHOST_USER=markus@barta.com
      - SMARTHOST_ALIASES=*
      - RELAY_NETWORKS=:172.0.0.0/8
    env_file:
      - /run/agenix/csb1-smtp-env
    labels:
      - traefik.enable=false

  # ============================================
  # WEG Portal - multi-tenant house portal
  # ============================================
  weg-portal:
    image: ghcr.io/markus-barta/weg-portal:latest
    container_name: weg-portal
    restart: unless-stopped
    env_file:
      - /run/agenix/csb1-weg-portal-env
    environment:
      - ADDR=:8080
      - BASE_URL=https://jhw22.hausv.org
      - ROOT_DOMAIN=hausv.org
      - DEFAULT_TENANT=jhw22
      - LOCAL_DEV_LOGIN=false
      - SMTP_HOST=smtp.resend.com
      - SMTP_PORT=587
      - MAIL_FROM=WEG Portal <noreply@notify.hausv.org>
      - HA_BASE_URL=http://100.64.0.7:8123
      - PARKING_METER_ENERGY_ENTITY=sensor.kws_306wf_energy_meter_energy
      - PARKING_POWER_ENTITY=sensor.kws360_power
      - PARKING_PRICE_ENTITY=sensor.epex_spot_data_total_price
      - PARKING_DATA_PATH=/data/parking.json
      - PARKING_SAMPLE_INTERVAL=15m
      - PARKING_HISTORY_START=2026-01-01
    volumes:
      - /var/lib/csb1-docker/weg-portal:/data
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.weg-portal.rule=Host(`jhw22.hausv.org`)
      - traefik.http.routers.weg-portal.tls.certresolver=default
      - traefik.http.routers.weg-portal.tls=true
      - traefik.http.services.weg-portal.loadbalancer.server.port=8080
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.weg-portal.middlewares=cloudflarewarp@file

  restic-cron-hetzner:
    build: ./restic-cron
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/docker/volumes:/backup/var/lib/docker/volumes:ro
      - /home:/backup/home:ro
      - /root:/backup/root:ro
      - /etc:/backup/etc:ro
      # SSH private key now sourced from agenix (was: ./restic-cron/id_rsa)
      - /run/agenix/csb1-restic-cron-id-rsa:/root/.ssh/id_rsa:ro
      - ./restic-cron/id_rsa.pub:/root/.ssh/id_rsa.pub:ro
      - ./restic-cron/ssh_known_hosts:/root/.ssh/known_hosts:ro
      - ./restic-cron/hetzner/run_backup.sh:/usr/local/bin/run_backup.sh:ro
      - ./restic-cron/hetzner/run_check.sh:/usr/local/bin/run_check.sh:ro
      - ./restic-cron/hetzner/run_cleanup.sh:/usr/local/bin/run_cleanup.sh:ro
      - ./restic-cron/hetzner/start_cron.sh:/usr/local/bin/start_cron.sh:ro
    environment:
      RESTIC_BACKUP_OPTIONS: "-r sftp:u387549-sub1@u387549.your-storagebox.de:/"
      MAIL_SUBJECT: "💾 Restic Backup netcup csb1 (hetzner)"
      CRON_BACKUP_EXPRESSION: "30 1 * * *" # 1:30am
    env_file:
      - /run/agenix/csb1-restic-cron-hetzner-env
    labels:
      - com.centurylinklabs.watchtower.enable=false
      - traefik.enable=false
    networks:
      - smtp

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    command: --schedule "0 0 8 * * SAT" --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATIONS_HOSTNAME=csb1
      - WATCHTOWER_NOTIFICATION_TITLE_TAG=🌐
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
    env_file:
      - /run/agenix/csb1-watchtower-env
    labels:
      - traefik.enable=false

  # ============================================
  # Excalidraw - Self-hosted whiteboard
  # ============================================
  excalidraw:
    image: excalidraw/excalidraw:latest
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.excalidraw.rule=Host(`draw.barta.cm`)
      - traefik.http.routers.excalidraw.tls.certresolver=default
      - traefik.http.routers.excalidraw.tls=true
      - traefik.http.services.excalidraw.loadbalancer.server.port=80
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.excalidraw.middlewares=cloudflarewarp@file

  # ============================================
  # jobs-at - KI-Exposition des österreichischen Arbeitsmarkts
  # ============================================
  jobs-at:
    image: ghcr.io/markus-barta/jobs-at:latest
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - "traefik.http.routers.jobs-at.rule=Host(`zukunftschance.ai.barta.cm`)"
      - traefik.http.routers.jobs-at.tls.certresolver=default
      - traefik.http.routers.jobs-at.tls=true
      - traefik.http.services.jobs-at.loadbalancer.server.port=80
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.jobs-at.middlewares=cloudflarewarp@file

  # ============================================
  # PPM - Personal Project Management
  # ============================================
  ppm:
    image: ghcr.io/markus-barta/paimos:4.4.0 # explicit live pin; bump deliberately with the PAIMOS release/deploy flow
    container_name: ppm
    restart: unless-stopped
    environment:
      - PORT=8888
      - COOKIE_SECURE=true
      - BRAND_PRODUCT_NAME=PPM
      - BRAND_WEBSITE_URL=https://pm.barta.cm
      - BRAND_PUBLIC_URL=https://pm.barta.cm
      - BRAND_EMAIL_FROM=noreply@barta.cm
      - BRAND_DB_FILENAME=ppm.db
      - BRAND_MINIO_BUCKET=ppm-attachments
      - BRAND_HEALTH_SERVICE_NAME=ppm
      - BRAND_TOTP_ISSUER=PPM
    env_file:
      - /run/agenix/csb1-ppm-env
    volumes:
      - ppm_data:/app/data
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.ppm.rule=Host(`pm.barta.cm`)
      - traefik.http.routers.ppm.tls.certresolver=default
      - traefik.http.routers.ppm.tls=true
      - traefik.http.services.ppm.loadbalancer.server.port=8888
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.ppm.middlewares=cloudflarewarp@file

  # ============================================
  # Janus - secret metadata control plane
  # ============================================
  janus:
    # Source extracted to github.com/markus-barta/janus (go-envelope/). Deployed
    # from a cosign-signed image with SPDX SBOM + SLSA build provenance, pinned
    # by digest. To bump: cut a go-envelope-v* release, verify, update digest.
    image: ghcr.io/markus-barta/janus/janus-envelope:go-envelope-v1.147@sha256:eae4c95838cfcd29a9cd16101e866e9ae68a058c3a8ad243cd8baf43b55ad3aa
    container_name: janus
    restart: unless-stopped
    environment:
      - JANUS_PUBLIC_URL=https://vault.barta.cm
      - JANUS_PRODUCT_MODE=self_hosted
      - JANUS_DATA_DIR=/data
      - JANUS_CATALOG_FILE=/catalog/agenix-catalog.json
      - JANUS_REQUIRE_AUTH=true
      - JANUS_BOOTSTRAP_OWNER=false
      - JANUS_ADMIN_SUBJECTS=markus@barta.com
      - JANUS_AUDITOR_SUBJECTS=markus@barta.com
      - JANUS_OPERATOR_SUBJECTS=markus@barta.com
      - JANUS_ADMIN_GROUPS=janus:admin
      - JANUS_AUDITOR_GROUPS=janus:auditor
      - JANUS_OPERATOR_GROUPS=janus:operator
      - OIDC_ISSUER=https://auth.inspr.at
    env_file:
      - /run/agenix/csb1-janus-env
    volumes:
      - janus_data:/data
      - ./janus/catalog:/catalog:ro
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.janus.rule=Host(`vault.barta.cm`)
      - traefik.http.routers.janus.tls.certresolver=default
      - traefik.http.routers.janus.tls=true
      - traefik.http.services.janus.loadbalancer.server.port=8080
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.janus.middlewares=cloudflarewarp@file

  # ============================================
  # Janus Rust engine — staged approved-use runtime
  # ============================================
  janus-engine-staged:
    # Disabled by default. Enable only for host-local dry smoke:
    #   docker compose --profile janus-engine-staged config --quiet
    #   docker compose --profile janus-engine-staged run --rm janus-engine-staged
    #
    # This is intentionally not on Traefik and does not replace the live
    # go-envelope service above. The Rust engine image is cosign-signed and
    # pinned by digest for host-local dry smoke only.
    image: ghcr.io/markus-barta/janus/janus-engine:rust-engine-v0.1.0@sha256:99cfc52b9484fcd729bd02b2a6a685fd32d31d579e8c5ed903621fbcba1ce8a9
    container_name: janus-engine-staged
    profiles: ["janus-engine-staged"]
    restart: "no"
    entrypoint: ["janusd"]
    command: ["--help"]
    environment:
      - JANUS_PERMIT_DIR=/run/janus/permits
      - JANUS_WARDEN_PERMIT_DIR=/run/janus/permits
      - JANUS_RUN_PERMIT_DIR=/run/janus/permits
      - JANUS_WARDEN_BACKEND=age
      - JANUS_WARDEN_DESTINATION=csb1-janus-env-dry-run
      - JANUS_WARDEN_EXECUTOR=janus-run@csb1
      - JANUS_RUN_EXECUTOR=janus-run@csb1
      - JANUS_WARDEN_SCOPE=janus/csb1/staged
      - JANUS_RUN_SCOPE=janus/csb1/staged
      - JANUS_WARDEN_AGE_MANIFEST_FILE=/etc/janus/secretspec.toml
      - JANUS_AGE_MANIFEST_FILE=/etc/janus/secretspec.toml
      - JANUS_WARDEN_AGE_PROFILE=csb1
      - JANUS_AGE_PROFILE=csb1
      - JANUS_WARDEN_AGE_STORE_DIR=/var/lib/janus/secrets
      - JANUS_AGE_STORE_DIR=/var/lib/janus/secrets
      - JANUS_WARDEN_AGE_IDENTITY_FILE=/run/janus/age/identity
      - JANUS_AGE_IDENTITY_FILE=/run/janus/age/identity
      - JANUS_WARDEN_AGE_RECIPIENTS_FILE=/run/janus/age/recipient.pub
      - JANUS_AGE_RECIPIENTS_FILE=/run/janus/age/recipient.pub
      - JANUS_RUN_PROFILE_MANIFEST=/etc/janus/managed-commands.toml
      - JANUS_MANAGED_PROFILE_MANIFEST=/etc/janus/managed-commands.toml
    volumes:
      - ./janus/secretspec.toml:/etc/janus/secretspec.toml:ro
      - ./janus/managed-commands.toml:/etc/janus/managed-commands.toml:ro
      - janus_engine_age_store:/var/lib/janus/secrets
      - janus_engine_permits:/run/janus/permits
      - /etc/ssh/ssh_host_ed25519_key:/run/janus/age/identity:ro
      - /etc/ssh/ssh_host_ed25519_key.pub:/run/janus/age/recipient.pub:ro
    labels:
      - traefik.enable=false

  # ============================================
  # MinIO - Object storage (PPM attachments)
  # ============================================
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - /run/agenix/csb1-minio-env
    volumes:
      - minio_data:/data
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio-console.rule=Host(`minio.barta.cm`)
      - traefik.http.routers.minio-console.tls.certresolver=default
      - traefik.http.routers.minio-console.tls=true
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.minio-console.middlewares=cloudflarewarp@file

  # ============================================
  # FleetCom Bosun — heartbeats + container lifecycle agent
  # Absorbed from prior project=docker (NIX-110) into csb1 project.
  # Container name + network attachment unchanged.
  # ============================================
  fleetcom-agent:
    image: ghcr.io/markus-barta/fleetcom-bosun:latest
    container_name: fleetcom-agent
    restart: unless-stopped
    # mem_limit caps a known leak in bosun (FLEET-78, cs1 outage 2026-04-25).
    mem_limit: 512m
    memswap_limit: 512m
    env_file: [/run/agenix/csb1-fleetcom-agent-env]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    environment:
      - FLEETCOM_URL=https://fleet.barta.cm
      - FLEETCOM_HOSTNAME=csb1
      - WATCHTOWER_URL=http://watchtower:8080
    networks:
      - default

volumes:
  docmost_db_data: {}
  docmost_redis_data: {}
  docmost_data: {}
  paperless_db_data: {}
  paperless_redis_data: {}
  paperless_data: {}
  paperless_media: {}
  paperless_consume: {}
  ppm_data: {}
  janus_data: {}
  janus_engine_age_store: {}
  janus_engine_permits: {}
  minio_data: {}

networks:
  internal:
  traefik:
  smtp:
  docker-sock-traefik:
    internal: true
