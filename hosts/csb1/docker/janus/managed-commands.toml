# Reviewed managed-command profile for the disabled `janus-engine-staged`
# compose profile. The secret_ref is deterministic for project `janus` and
# manifest name `csb1-janus-env` in secretspec.toml.
[[profiles]]
id = "profile.csb1-janus-env"
secret_ref = "sec_4c5e18e08c2d9137b9f1"
executor = "janus-run@csb1"
destination = "csb1-janus-env-dry-run"
env = "JANUS_SECRET_SMOKE"
binary = "/usr/bin/true"
allowed_args = []
timeout_seconds = 30
max_stdout_bytes = 65536
max_stderr_bytes = 65536

[profiles.consumer]
consumer_ref = "consumer.csb1_janus_env_smoke"
kind = "managed_command"
owner = "janusd"
environment = "csb1-staged"
reload = "none"
validation = ["janus-engine-staged-smoke"]
supports_dual_value = false
blast_radius = "local dry smoke only; no external egress"
