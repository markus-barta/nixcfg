# Production-reviewed Janus env-file handoff contract for PHAROS-40/94.
# This file is value-free: it defines per-host outputs and hash sidecars only.
# Live pharosd consumes the Janus sidecar directory in janus mode after the
# active-host dual-mode migration window completed successfully.

[[env_files]]
id = "profile.PHAROS_BEACON_CSB0_TOKEN"
secret_ref = "sec_15072a6f998d5d42effc"
executor = "janus-run@csb1"
destination = "pharos-beacon-csb0"
env = "PHAROS_TOKEN"
output = "/run/janus/env/pharos/beacons/csb0.env"

[env_files.hash_sidecar]
format = "pharos-beacon-token-generation-v2"
subject = "csb0"
output = "/run/janus/env/pharos/beacon-token-hashes/csb0.json"

[env_files.consumer]
consumer_ref = "consumer.pharos_beacon_csb0"
kind = "service"
owner = "pharos"
environment = "production"
reload = "none"
validation = ["pharos-beacon-token-sidecar-preflight", "pharos-report-janus-mode-smoke"]
supports_dual_value = false
blast_radius = "production Pharos beacon token for csb0"

