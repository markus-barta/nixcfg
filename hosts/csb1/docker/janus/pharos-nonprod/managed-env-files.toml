# Staged profile for PHAROS-40 / JANUS-261.
# This is a reviewed env-file handoff contract only. It does not contain a
# secret literal and is not mounted into production pharosd until explicitly
# reviewed and deployed.

[[env_files]]
id = "profile.PHAROS_NONPROD_REGISTRATION"
secret_ref = "sec_996594ff9c5c5a440374"
executor = "janus-run@csb1"
destination = "pharos-nonprod"
env = "PHAROS_REGISTRATION_TOKEN"
output = "/run/janus/env/pharos/pharos.env"

[env_files.consumer]
consumer_ref = "consumer.pharos_nonprod"
kind = "service"
owner = "pharos"
environment = "nonprod"
reload = "none"
validation = ["pharos-registration-preflight"]
supports_dual_value = false
blast_radius = "non-production Pharos host registration only"

# Reviewed sidecar handoff contracts for PHAROS-40/94. These entries define the
# value-free Janus shape for per-host beacon token migration, but production
# pharosd does not consume them until the encrypted Janus secret store is
# populated and the generated sidecar directory is explicitly mounted.

[[env_files]]
id = "profile.PHAROS_BEACON_CSB0_TOKEN"
secret_ref = "sec_39f422c0bed268d9a523"
executor = "janus-run@csb1"
destination = "pharos-beacon-csb0"
env = "PHAROS_TOKEN"
output = "/run/janus/env/pharos/beacons/csb0.env"

[env_files.hash_sidecar]
format = "pharos-beacon-token-generation-v2"
subject = "csb0"
output = "/run/janus/env/pharos/beacon-token-hashes/csb0.json"

[env_files.consumer]
consumer_ref = "consumer.pharos_beacon_csb0"
kind = "service"
owner = "pharos"
environment = "nonprod"
reload = "none"
validation = ["pharos-beacon-token-sidecar-preflight"]
supports_dual_value = false
blast_radius = "non-production Pharos beacon token for csb0"

