services:
  fleetcom:
    image: ghcr.io/markus-barta/fleetcom:latest
    container_name: fleetcom
    restart: unless-stopped
    volumes:
      - fleetcom-data:/app/data
    env_file:
      - /run/agenix/csb1-fleetcom-env
    environment:
      - PORT=8090
      - DB_PATH=/app/data/fleetcom.db
    labels:
      # HTTPS routing
      - traefik.http.routers.fleetcom.rule=Host(`fleet.barta.cm`)
      - traefik.http.routers.fleetcom.entrypoints=web-secure
      - traefik.http.routers.fleetcom.tls=true
      - traefik.http.routers.fleetcom.tls.certresolver=default
      - traefik.http.services.fleetcom.loadbalancer.server.port=8090
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.fleetcom.middlewares=cloudflarewarp@file
      # HTTP → HTTPS redirect
      - traefik.http.routers.fleetcom-http.rule=Host(`fleet.barta.cm`)
      - traefik.http.routers.fleetcom-http.entrypoints=web
      - traefik.http.routers.fleetcom-http.middlewares=redirect-to-https@docker
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  traefik:
    external: true
    name: csb1_traefik

volumes:
  fleetcom-data:
