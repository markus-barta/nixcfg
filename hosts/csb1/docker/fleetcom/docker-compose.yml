# NIX-110 NOTE: this file is a pulled-from-csb1 copy for documentation
# / future migration. The fleetcom server is intentionally OUT OF SCOPE
# for the NIX-110 cutover (M6) — it stays running from
# /home/mba/docker/fleetcom/ on csb1 until a separate migration epic
# brings it in-git. The /etc/fleetcom-deploy.sh script (defined in
# hosts/csb1/configuration.nix) still references the old path and
# remains valid as long as that's true.
#
# Do NOT `docker compose up -d` from this directory unless you ALSO
# stop the legacy /home/mba/docker/fleetcom/ stack first.

services:
  fleetcom:
    image: ghcr.io/markus-barta/fleetcom:latest
    container_name: fleetcom
    restart: unless-stopped
    volumes:
      - fleetcom-data:/app/data
    env_file:
      - /run/agenix/csb1-fleetcom-env
      - /run/agenix/csb1-fleetcom-alerts-env
    environment:
      - PORT=8090
      - DB_PATH=/app/data/fleetcom.db
    labels:
      # HTTPS routing
      - traefik.http.routers.fleetcom.rule=Host(`fleet.barta.cm`)
      - traefik.http.routers.fleetcom.entrypoints=web-secure
      - traefik.http.routers.fleetcom.tls=true
      - traefik.http.routers.fleetcom.tls.certresolver=default
      - traefik.http.services.fleetcom.loadbalancer.server.port=8090
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.fleetcom.middlewares=cloudflarewarp@file
      # HTTP → HTTPS redirect
      - traefik.http.routers.fleetcom-http.rule=Host(`fleet.barta.cm`)
      - traefik.http.routers.fleetcom-http.entrypoints=web
      - traefik.http.routers.fleetcom-http.middlewares=redirect-to-https@docker
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  traefik:
    external: true
    name: csb1_traefik

volumes:
  fleetcom-data:
