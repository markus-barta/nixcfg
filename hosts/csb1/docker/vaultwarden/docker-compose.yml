# Vaultwarden on csb1 — backend for the JANUS LLM-vault connector.
#
# Decision rationale: csb1 over csb0 — blast-radius separation from
# garage-door / MQTT / Headscale-critical services on csb0. csb1 is
# already the productivity / sensitive-data host (PPM, Docmost,
# Paperless). See:
#   - PAIMOS · JANUS · Knowledge → Guideline `architecture-v0` §10
#   - PAIMOS · JANUS · Knowledge → Runbook `vaultwarden-deploy-csb1` (forthcoming)
#   - INSPR-180 (Janus-Warden tracking epic)
#
# This is the FIRST production service on csb1 living in nixcfg git.
# PPM, Grafana, Paperless, etc. still live in `/home/mba/docker/` on
# the host; in-git migration is a separate task (see configuration.nix
# TODO). This compose leads the new pattern: per-service subdirectory
# with its own compose, attached to the host-shared `csb1_traefik`
# network as external.
#
# Project name "vaultwarden" → containers prefixed accordingly. Stays
# out of the `csb1` compose project namespace (which currently owns the
# legacy stack in /home/mba/docker/).
name: vaultwarden

services:
  vaultwarden:
    # Pin explicitly. Watchtower disabled below — version bumps are a
    # deliberate PR. Review upstream changelog before bumping:
    # https://github.com/dani-garcia/vaultwarden/releases
    image: vaultwarden/server:1.32.7-alpine
    container_name: vaultwarden
    restart: unless-stopped

    # Vaultwarden baseline RSS ~50 MiB. 256m gives ~5× headroom + OOM-kills
    # runaway behavior (same defensive pattern as fleetcom-agent on csb1).
    mem_limit: 256m
    memswap_limit: 256m

    environment:
      # --- canonical service URL (used in invitation links, WebAuthn, etc.) ---
      - DOMAIN=https://vault.barta.cm

      # --- access control: invite-only, no public signups ---
      - SIGNUPS_ALLOWED=false
      - INVITATIONS_ALLOWED=true

      # --- web vault + protocol features ---
      - WEB_VAULT_ENABLED=true
      - WEBSOCKET_ENABLED=true

      # --- client IP correctly attributed (Traefik + Cloudflare upstream) ---
      - IP_HEADER=X-Forwarded-For

      # --- logging into /data so Restic picks it up alongside the DB ---
      - LOG_LEVEL=info
      - EXTENDED_LOGGING=true
      - LOG_FILE=/data/vaultwarden.log

      # --- internal rocket port (matches the Traefik service port label) ---
      - ROCKET_PORT=8080

      - TZ=Europe/Vienna

    # Secrets injected by agenix at boot. MUST contain at minimum:
    #   ADMIN_TOKEN=<random 48+ chars; openssl rand -base64 48>
    # Optional (recommended once email is set up):
    #   SMTP_HOST=...
    #   SMTP_PORT=587
    #   SMTP_FROM=noreply@barta.cm
    #   SMTP_USERNAME=...
    #   SMTP_PASSWORD=...
    #   SMTP_SECURITY=starttls
    env_file:
      - /run/agenix/csb1-vaultwarden-env

    volumes:
      # SQLite DB + attachments + logs all live here. Restic must back this up.
      - vaultwarden_data:/data

    networks:
      - traefik

    labels:
      - traefik.enable=true
      - traefik.http.routers.vaultwarden.rule=Host(`vault.barta.cm`)
      - traefik.http.routers.vaultwarden.tls.certresolver=default
      - traefik.http.routers.vaultwarden.tls=true
      - traefik.http.services.vaultwarden.loadbalancer.server.port=8080
      - traefik.docker.network=csb1_traefik
      - traefik.http.routers.vaultwarden.middlewares=cloudflarewarp@file
      # Security-sensitive service: never auto-update. Bumps are PRs.
      - com.centurylinklabs.watchtower.enable=false

volumes:
  vaultwarden_data:
    name: vaultwarden_data

networks:
  # Attach to the host-shared traefik network (created by the main
  # /home/mba/docker/ compose). External so this file does not own it.
  traefik:
    external: true
    name: csb1_traefik
