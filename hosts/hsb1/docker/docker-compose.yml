# name: miniserver24
services:
  zigbee2mqtt:
    container_name: zigbee2mqtt
    depends_on:
      - mosquitto
    image: koenkk/zigbee2mqtt:latest
    volumes:
      - /home/mba/docker/mounts/zigbee2mqtt:/app/data
    restart: unless-stopped
    #restart: "no"
    ports:
      - "8888:8888"
    environment:
      - TZ=Europe/Vienna
    env_file:
      - /home/mba/secrets/zigbee2mqtt.env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"
    #entrypoint: ["sh", "-c", "env && tail -f /dev/null"]

  #health-pixoo:
  #  image: ghcr.io/markus-barta/health-pixoo:latest
  #  container_name: health-pixoo
  #  network_mode: host
  #  restart: unless-stopped
  #  environment:
  #    - TZ=Europe/Vienna
  #    - PIXOO_IP=192.168.1.159
  #    - PIXOO_BRIGHTNESS=70
  #    - MQTT_HOST=localhost
  #    - MQTT_PORT=1883
  #    - MQTT_USER=smarthome
  #    - LOG_LEVEL=info
  #  env_file:
  #    - /home/mba/secrets/smarthome.env
  #    - /home/mba/secrets/health-pixoo.env
  #  labels:
  #    - "com.centurylinklabs.watchtower.enable=true"
  #    - "com.centurylinklabs.watchtower.scope=weekly"

  # pidicon (legacy, archived) — commented out, replaced by pixdcon
  # pidicon-light (legacy, archived) — commented out, replaced by pixdcon

  pixdcon:
    image: ghcr.io/markus-barta/pixdcon:latest
    container_name: pixdcon
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Europe/Vienna
      - MQTT_PORT=1883
      - LOG_LEVEL=info
      - PIXDCON_CONFIG_PATH=/data/config.json
    env_file:
      - /run/agenix/hsb1-pixdcon-env # MOSQUITTO_HOST / MOSQUITTO_USER / MOSQUITTO_PASS / SONNEN_BATTERY_HOST / SONNEN_BATTERY_API_TOKEN
    volumes:
      - /home/mba/docker/mounts/pixdcon/config.json:/data/config.json # rw — web UI saves settings
      - /home/mba/docker/mounts/pixdcon/scenes:/data/scenes # rw — editable scene files
      - /home/mba/docker/mounts/pixdcon/generated-scenes:/data/generated-scenes # rw — cloned/detached scenes
      - /home/mba/docker/mounts/funkeykid/images:/app/assets/pixoo/funkeykid:ro # funkeykid v2 images (overrides baked-in v1)
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  # Reconciled from deployed host state on 2026-05-25 (was running on hsb1
  # but missing from repo). See docs/FUNKEYKID.md.
  funkeykid:
    image: ghcr.io/markus-barta/funkeykid:latest
    container_name: funkeykid
    network_mode: host
    restart: unless-stopped
    privileged: true # Required for /dev/input access
    environment:
      - TZ=Europe/Vienna
      - XDG_RUNTIME_DIR=/run/user/1001
      - PULSE_SERVER=unix:/run/user/1001/pulse/native
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket
    env_file:
      - /home/mba/secrets/smarthome.env # MQTT credentials
      - /home/mba/secrets/funkeykid-api.env # ELEVENLABS_API_KEY + OPENROUTER_API_KEY
    volumes:
      - /home/mba/docker/mounts/funkeykid/settings.json:/data/settings.json
      - /home/mba/docker/mounts/funkeykid/sounds:/data/sounds
      - /home/mba/docker/mounts/funkeykid/images:/data/images
      - /home/mba/docker/mounts/funkeykid/ai-generated:/data/ai-generated
      - /dev/input:/dev/input
      - /run/user/1001:/run/user/1001
      - /run/dbus:/run/dbus
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - /home/mba/docker/mounts/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    env_file:
      - /home/mba/secrets/smarthome.env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  # https://github.com/koush/scrypted
  scrypted:
    image: ghcr.io/koush/scrypted
    container_name: scrypted
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Europe/Vienna
      #- SCRYPTED_WEBHOOK_UPDATE_AUTHORIZATION=${SCRYPTED_WEBHOOK_UPDATE_AUTHORIZATION}
      - SCRYPTED_WEBHOOK_UPDATE=http://localhost:10444/v1/update
      # Enable UPnP for device discovery
      - SCRYPTED_UNMANAGED_PLUGINS_SCAN=false
      # Enable to try Avahi inside the container
      #- SCRYPTED_DOCKER_AVAHI=true
    volumes:
      - /home/mba/docker/mounts/scrypted/volume:/server/volume
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"
    env_file:
      - /etc/secrets/tapoC210-00.env # note: not in default user's secrets as it is used by other users (eg. kiosk user)

  # https://github.com/namshi/docker-smtp
  smtp:
    image: namshi/smtp
    restart: unless-stopped
    # runs in default network
    #     networks:
    #       - smtp
    environment:
      - TZ=Europe/Vienna
      - SMARTHOST_ADDRESS=mail.hover.com
      - SMARTHOST_PORT=587
      #      - SMARTHOST_PORT=465
      - SMARTHOST_USER=markus@barta.com
      - SMARTHOST_ALIASES=*
      - RELAY_NETWORKS=:172.0.0.0/8
    env_file:
      - /run/agenix/hsb1-smtp-env
    labels:
      - traefik.enable=false
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    restart: unless-stopped
    # Using host network like your Home Assistant container for proper mDNS
    network_mode: host
    security_opt:
      # Required for Bluetooth via dbus
      - apparmor:unconfined
    volumes:
      # Adjusted to match your mount pattern
      - /home/mba/docker/mounts/matter-server:/data
      # D-Bus access for Bluetooth (matches your Home Assistant config)
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=Europe/Vienna
    # Set Bluetooth adapter
    # command: --storage-path /data --paa-root-cert-dir /data/credentials --bluetooth-adapter 0
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      # conf + passwd delivered encrypted via agenix (decrypted to /run/agenix at nixos switch).
      # Server-side broker config incl. the vendor-locked OPUS bridge credential — never plaintext in git.
      - /run/agenix/hsb1-mosquitto-conf:/mosquitto/config/mosquitto.conf:ro
      - /run/agenix/hsb1-mosquitto-passwd:/mosquitto/config/mosquitto_passwd:ro
      - /home/mba/docker/mounts/mosquitto/var/run:/var/run # needed to fix "unable to write PID" error. https://github.com/eclipse/mosquitto/issues/2074#issuecomment-787135608
      - /home/mba/docker/mounts/mosquitto/data:/mosquitto/data
      - /home/mba/docker/mounts/mosquitto/log:/mosquitto/log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  apprise:
    image: caronc/apprise:latest
    container_name: apprise
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - /home/mba/docker/mounts/apprise/config:/config
      - /home/mba/docker/mounts/apprise/etc/nginx/sites-available/default:/etc/nginx/sites-available/default
      - /tmp:/tmp
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"
  #   dns:
  #     - 1.1.1.1

  restic-cron-hetzner:
    build: /home/mba/Code/nixcfg/hosts/hsb1/docker/restic-cron
    container_name: restic-cron-hetzner
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home:/backup/home:ro
      - /root:/backup/root:ro
      - /etc:/backup/etc:ro
      # Use SSH key from agenix
      - /run/agenix/hsb1-restic-ssh-key:/root/.ssh/id_rsa:ro
      - /home/mba/Code/nixcfg/hosts/hsb1/docker/restic-cron/ssh_known_hosts:/root/.ssh/known_hosts:ro
      # BIND MOUNTS: Local scripts override container defaults
      - /home/mba/Code/nixcfg/hosts/hsb1/docker/restic-cron/hetzner/run_backup.sh:/usr/local/bin/run_backup.sh:ro
      - /home/mba/Code/nixcfg/hosts/hsb1/docker/restic-cron/hetzner/run_check.sh:/usr/local/bin/run_check.sh:ro
      - /home/mba/Code/nixcfg/hosts/hsb1/docker/restic-cron/hetzner/run_cleanup.sh:/usr/local/bin/run_cleanup.sh:ro
      - /home/mba/Code/nixcfg/hosts/hsb1/docker/restic-cron/hetzner/start_cron.sh:/usr/local/bin/start_cron.sh:ro
    environment:
      RESTIC_BACKUP_OPTIONS: "-r sftp:u387549-sub2@u387549.your-storagebox.de:/"
      MAIL_SUBJECT: "💾 Restic backup report (hsb1)"
      CRON_BACKUP_EXPRESSION: "30 1 * * *" # 1:30am
    env_file:
      # Load RESTIC_PASSWORD from agenix
      - /run/agenix/hsb1-restic-env
    labels:
      - com.centurylinklabs.watchtower.enable=false

  opus-stream-to-mqtt:
    image: node:alpine
    container_name: opus-stream-to-mqtt
    network_mode: host
    restart: unless-stopped
    env_file:
      - /run/agenix/opus-stream-hsb1
    environment:
      - TZ=Europe/Vienna
    volumes:
      - /etc/opus-stream-to-mqtt:/source:ro
      - opus-stream-app:/app
      - /home/mba/docker/mounts/shared/tmp:/shared-tmp
    working_dir: /app
    command: sh -c "cp /source/*.js /source/package*.json /app/ && npm install && npm start"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  # Weekly Watchtower - checks all containers with scope=weekly every Saturday at 05:00 (because at 04:30 opus-gw restarts)
  watchtower-weekly:
    image: beatkind/watchtower:latest
    container_name: watchtower-weekly
    restart: unless-stopped
    command: --schedule "0 0 5 * * 6" --label-enable --scope weekly
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - "WATCHTOWER_CLEANUP=true"
      - "DOCKER_API_VERSION=1.44"
      - "WATCHTOWER_DEBUG=true"
      # FLEET-1397: enable HTTP API so bosun can trigger updates.
      - "WATCHTOWER_HTTP_API_UPDATE=true"
      #      - "WATCHTOWER_POLL_INTERVAL=7200" # https://github.com/containrrr/watchtower/issues/669
      - "WATCHTOWER_NOTIFICATIONS=shoutrrr"
      - "WATCHTOWER_NOTIFICATIONS_HOSTNAME=hsb1"
      - "WATCHTOWER_NOTIFICATION_TITLE_TAG=🏠"
      - 'WATCHTOWER_NOTIFICATION_TEMPLATE={{range .}}{{.Time.Format "2006-01-02 15:04:05"}} ({{.Level}}): {{.Message}}{{println}}{{end}}'
    env_file:
      - /home/mba/secrets/watchtower.env
  #  dns:
  #     - 1.1.1.1

  nodered:
    #custom built image in github, originally from #image: nodered/node-red:latest
    image: ghcr.io/markus-barta/node-red-miniserver24:main
    container_name: nodered
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Europe/Vienna
    volumes:
      - /home/mba/docker/mounts/nodered/data:/data
      - /home/mba/docker/mounts/shared/tmp:/shared-tmp
      - /home/mba/docker/mounts/nodered/scripts:/scripts
      - /home/mba/docker/mounts/nodered/pixoo-venv:/pixoo-venv
      - /home/mba/docker/mounts/nodered/webserver:/webserver
      - /home/mba/docker/mounts/nodered/pixoo-media:/pixoo-media
      - /home/mba/secrets:/secrets:r
    env_file:
      - /home/mba/secrets/smarthome.env
    entrypoint: ["/bin/bash", "/scripts/startup.sh"]
    command: ["npm", "start", "--", "--userDir", "/data"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  # Reconciled from deployed host state on 2026-05-25 (was running on hsb1
  # but missing from repo). Long-lived idle shell with claude-code CLI for
  # ad-hoc agent runs on hsb1; secrets mounted read-only.
  claude-code:
    image: node:24-alpine
    container_name: claude-code
    network_mode: host
    working_dir: /workspace
    environment:
      - TZ=Europe/Vienna
    volumes:
      - /home/mba/docker/mounts/claude-code/workspace:/workspace
      - /home/mba/docker/mounts/claude-code/config:/root/.claude
      - /home/merlin/secrets/github-pat-merlin:/run/secrets/github-pat-merlin:ro
      - /home/mba/secrets/pmo.env:/run/secrets/pmo.env:ro
      - /home/mba/secrets/ppm.env:/run/secrets/ppm.env:ro
    command: >
      sh -c "
        if ! which claude > /dev/null 2>&1; then
          npm install -g @anthropic-ai/claude-code;
        fi;
        sleep infinity
      "
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Vienna
      - VERSION=docker
    volumes:
      - /var/lib/docker/volumes/plex-config:/config
      - /mnt/fritzbox-media:/media:ro
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  # FleetCom Bosun — heartbeats + container lifecycle to https://fleet.barta.cm.
  # Migrated from /opt/fleetcom-agent/ on 2026-04-19 (NIX-82). FLEETCOM_TOKEN
  # stays in /opt/fleetcom-agent/.env until a follow-up wires the agenix
  # secret (fleetcom-token-hsb1) directly.
  fleetcom-agent:
    image: ghcr.io/markus-barta/fleetcom-bosun:latest
    container_name: fleetcom-agent
    restart: unless-stopped
    # mem_limit caps a known leak in bosun (FLEET-78, cs1 outage 2026-04-25).
    # Baseline RSS ~13 MiB; 512m gives ~40× headroom and OOM-kills runaway.
    mem_limit: 512m
    memswap_limit: 512m
    env_file: [/opt/fleetcom-agent/.env]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    environment:
      - FLEETCOM_URL=https://fleet.barta.cm
      - FLEETCOM_HOSTNAME=hsb1
      # FLEET-1397: dashboard "Update agent" → bosun calls watchtower-weekly's
      # HTTP API. WATCHTOWER_TOKEN is provided via /opt/fleetcom-agent/.env.
      - WATCHTOWER_URL=http://watchtower-weekly:8080
    labels:
      - traefik.enable=false
      - com.centurylinklabs.watchtower.enable=true
      # FLEET-1397: scope=weekly so watchtower-weekly (which runs with
      # --scope weekly) picks bosun up for both the Saturday auto-cycle
      # AND the on-demand HTTP API trigger.
      - com.centurylinklabs.watchtower.scope=weekly

  # fritz-tripwire — webhook receiver that snapshots all Fritz mesh devices
  # when one fails. Triggered by Uptime Kuma on hsb0 (POST to /hooks/fritz-down).
  # Output lands in /home/mba/docker/mounts/fritz-tripwire/incidents/fritz-<ip>-<ts>/.
  # See hosts/hsb1/docs/RUNBOOK.md → "fritz-tripwire" for setup + Kuma wiring.
  fritz-tripwire:
    build: /home/mba/Code/nixcfg/hosts/hsb1/docker/fritz-tripwire
    container_name: fritz-tripwire
    restart: unless-stopped
    environment:
      # Central Apprise hub (same compose network) for LaMetric alerts (NIX-172).
      - APPRISE_BASE=http://apprise:8000
    ports:
      - "9000:9000"
    volumes:
      - /home/mba/docker/mounts/fritz-tripwire/incidents:/incidents
      - /home/mba/secrets/fritz.env:/secrets/fritz.env:ro
    labels:
      - com.centurylinklabs.watchtower.enable=false

volumes:
  opus-stream-app: # Mutable runtime for opus-stream-to-mqtt (node_modules cached here)

networks:
  bridge:
  local:
    driver: macvlan
    driver_opts:
      parent: enp3s0f0
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.5
