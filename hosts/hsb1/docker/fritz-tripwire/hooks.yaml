# webhook (adnanh/webhook) config for fritz-tripwire.
#
# Expected POST body (set in Uptime Kuma's "Custom Body" template):
#   { "ip": "192.168.1.7", "monitor": "Fritz.7 bz-repeater", "status": "Down" }
#
# msg dropped from the body 2026-06-04 (NIX-146): free-text {{ msg }} broke the
# JSON on DOWN events (chars in the failure detail) → whole body unparseable →
# every down logged as fritz-unknown. run.sh now gates DOWN-only via $3=status.
- id: fritz-down
  execute-command: /usr/local/bin/run.sh
  command-working-directory: /incidents
  response-message: "snapshot triggered\n"
  pass-arguments-to-command:
    - source: payload
      name: ip
    - source: payload
      name: monitor
    - source: payload
      name: status
