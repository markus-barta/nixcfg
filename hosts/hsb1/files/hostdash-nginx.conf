# nginx config for the hsb1-home container (HostDash) — NIX-280.
#
# Replaces nginx:alpine's stock default.conf for one reason: the runtime status
# artifact must be served SAME-ORIGIN as index.html, and it cannot simply be
# bind-mounted into the app directory.
#
# Why not just mount it at /usr/share/nginx/html/status?
#   Because /usr/share/nginx/html is ITSELF a read-only bind mount of an immutable
#   /nix/store path. Docker has to create the mountpoint directory inside it, and
#   that fails:
#       mkdirat .../usr/share/nginx/html/status: read-only file system
#   A mount cannot be nested inside a read-only mount. (Found the hard way on
#   2026-07-14: it left hsb1-home stuck in `Created` and the dashboard offline.)
#
# So the status directory is mounted somewhere writable-adjacent (/srv/hostdash-status)
# and nginx aliases it back under the app's own origin. Same origin, so HostDash can
# actually READ the response — which is the entire point of NIX-280. A cross-origin
# endpoint would be opaque, exactly the blindness being removed.

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # NIX-280 — host-generated runtime truth: which containers and units are actually
    # running. Written atomically every 60s by hostdash-status.service.
    #
    # no-store: this is liveness data. A cached status file is a LYING status file,
    # and the freshness contract (HostDash treats a stale `generated` as UNKNOWN,
    # never as healthy) only works if the browser is actually re-fetching it.
    location /status/ {
        alias /srv/hostdash-status/;
        autoindex off;
        add_header Cache-Control "no-store" always;
        default_type application/json;
    }
}
