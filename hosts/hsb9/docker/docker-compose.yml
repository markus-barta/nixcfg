# hsb9 docker services — parents-in-law home automation (NIX-139)
#
# Lightweight stack vs hsb1: just MQTT broker + Home Assistant for now.
# Zigbee2MQTT is scaffolded below but DISABLED until the SONOFF Zigbee 3.0
# dongle is migrated from the Pi 3 (NIX-140). HomeKit is NOT a separate
# container — it's Home Assistant's built-in HomeKit Bridge integration,
# configured in the HA UI once HA is up.
#
# Deploy (on hsb9): cd ~/Code/nixcfg/hosts/hsb9/docker && docker compose up -d
services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mounts/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mounts/mosquitto/config/mosquitto_passwd:/mosquitto/config/mosquitto_passwd
      - ./mounts/mosquitto/data:/mosquitto/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    depends_on:
      - mosquitto
    volumes:
      - ./mounts/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=Europe/Vienna
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  # Pharos beacon (PHAROS-6) — reports this host's status + nix freshness to
  # pharosd (csb1) every 60s.
  pharos-beacon:
    image: ghcr.io/markus-barta/pharos/pharosd:0.1.58@sha256:8eb6bdecddce5951c696e35afacdf5acd70acde0ff08e947e413dbc2e4474666
    container_name: pharos-beacon
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 256m
    cpus: "0.5"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=1777
    network_mode: host
    user: "1000:1000"
    entrypoint: ["/usr/local/bin/pharos-beacon"]
    healthcheck:
      disable: true
    env_file:
      - /run/agenix/pharos-beacon-hsb9-env
    environment:
      - PHAROS_URL=http://100.64.0.4:8088
      - PHAROS_INTERVAL=60
      - PHAROS_HOSTNAME=hsb9
      - PHAROS_CURRENT_KERNEL_MODULES_DIR=/host/run/current-system/kernel-modules/lib/modules
      - NIXCFG_DIR=/nixcfg
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/nixcfg
    volumes:
      - /home/mba/Code/nixcfg:/nixcfg:ro
      - /etc/NIXOS:/etc/NIXOS:ro
      - /run/current-system/kernel-modules/lib/modules:/host/run/current-system/kernel-modules/lib/modules:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "com.centurylinklabs.watchtower.scope=weekly"

  # hsb9-home — HostDash service landing page for this host. Static HTML/CSS/JS
  # served by nginx on :80, built from markus-barta/hostdash via Nix and mounted
  # read-only from /etc.
  hsb9-home:
    image: nginx:alpine
    container_name: hsb9-home
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=Europe/Vienna
    volumes:
      - /etc/hostdash/hsb9/share/hostdash-hsb9:/usr/share/nginx/html:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"

  # Weekly Watchtower — updates all scope=weekly containers Saturday 05:00
  # local. Added 2026-07-04 (NIX-228 follow-up): the weekly labels above
  # existed but no watchtower ran on this host, so nothing ever updated
  # (HA had drifted to 2026.5.4).
  watchtower-weekly:
    image: beatkind/watchtower:latest
    container_name: watchtower-weekly
    restart: unless-stopped
    command: --schedule "0 0 5 * * 6" --label-enable --scope weekly
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - "TZ=Europe/Vienna"
      - "WATCHTOWER_CLEANUP=true"
      - "DOCKER_API_VERSION=1.44"

  # ── Zigbee2MQTT — DISABLED until SONOFF dongle migrated (NIX-140) ──────────
  # When the dongle is on hsb9:
  #   1. `ls -l /dev/serial/by-id/` to find its stable path
  #   2. fill in the device mapping below + uncomment
  #   3. restore the coordinator backup from the Pi 3 (avoids re-pairing)
  # zigbee2mqtt:
  #   container_name: zigbee2mqtt
  #   image: koenkk/zigbee2mqtt:latest
  #   depends_on:
  #     - mosquitto
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - TZ=Europe/Vienna
  #   volumes:
  #     - ./mounts/zigbee2mqtt:/app/data
  #     - /run/udev:/run/udev:ro
  #   devices:
  #     - /dev/serial/by-id/<SONOFF-DONGLE>:/dev/ttyACM0
