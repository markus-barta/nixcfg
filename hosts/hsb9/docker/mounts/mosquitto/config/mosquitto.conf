# hsb9 mosquitto — MQTT broker for home automation (NIX-139)
# Auth required; the password file is generated on the host (gitignored),
# never committed. Bound to 1883; firewall restricts to LAN/tailnet.
listener 1883
allow_anonymous false
password_file /mosquitto/config/mosquitto_passwd

persistence true
persistence_location /mosquitto/data/

# Log to stdout — Docker's NixOS-default journald driver captures it,
# bounded by journald (~4G cap, auto-rotated). NOT an unbounded json-file
# nor a host log file that could balloon to tens of GB (the hsb0/hsb1
# failure mode). Keep notice for connection/auth visibility; drop the
# verbose "information" tier so a reconnect storm churns the journal
# instead of flooding it.
log_dest stdout
log_type error
log_type warning
log_type notice
