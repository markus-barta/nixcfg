# hsb9 mosquitto — MQTT broker for home automation (NIX-139)
# Auth required; the password file is generated on the host (gitignored),
# never committed. Bound to 1883; firewall restricts to LAN/tailnet.
listener 1883
allow_anonymous false
password_file /mosquitto/config/mosquitto_passwd

persistence true
persistence_location /mosquitto/data/

# Log to stdout — docker captures it (docker logs mosquitto). Avoids a
# host log-dir that the container's mosquitto user (UID 1883) can't write.
log_dest stdout
log_type warning
log_type error
log_type notice
log_type information
