  #    networks:
  #      - traefik
  #      - bitwarden
  #
  #  bitwarden-db:
  #    image: mariadb
  #    restart: always
  #    volumes:
  #      - bitwarden-db:/var/lib/mysql
  #    environment:
  #      - MYSQL_DATABASE=bitwarden
  #      - MYSQL_USER=bitwarden
