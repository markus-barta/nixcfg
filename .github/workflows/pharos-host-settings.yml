name: Pharos host settings

on:
  workflow_dispatch:
    inputs:
      host:
        description: Existing nixcfg host name
        required: true
        type: string
      accent:
        description: Six-digit host accent color
        required: true
        type: string
      kind:
        description: Expected host availability
        required: true
        type: choice
        options:
          - server
          - workstation
      suppress_down:
        description: Suppress heartbeat-down alerts
        required: true
        default: false
        type: boolean
      suppress_backup:
        description: Suppress backup alerts
        required: true
        default: false
        type: boolean
      suppress_nix_freshness:
        description: Suppress Nix freshness alerts
        required: true
        default: false
        type: boolean
      request_id:
        description: Pharos request correlation id
        required: true
        type: string

concurrency:
  group: pharos-host-settings-${{ inputs.host }}
  cancel-in-progress: false

jobs:
  update-and-merge:
    name: Validate, open PR, and merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      PHAROS_HOST: ${{ inputs.host }}
      PHAROS_ACCENT: ${{ inputs.accent }}
      PHAROS_KIND: ${{ inputs.kind }}
      PHAROS_SUPPRESS_DOWN: ${{ inputs.suppress_down }}
      PHAROS_SUPPRESS_BACKUP: ${{ inputs.suppress_backup }}
      PHAROS_SUPPRESS_NIX_FRESHNESS: ${{ inputs.suppress_nix_freshness }}
      PHAROS_REQUEST_ID: ${{ inputs.request_id }}
    steps:
      - name: Checkout nixcfg
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Apply narrow settings change
        run: |
          scripts/update-pharos-host-settings.sh \
            "$PHAROS_HOST" \
            "$PHAROS_ACCENT" \
            "$PHAROS_KIND" \
            "$PHAROS_SUPPRESS_DOWN" \
            "$PHAROS_SUPPRESS_BACKUP" \
            "$PHAROS_SUPPRESS_NIX_FRESHNESS" \
            "$PHAROS_REQUEST_ID"

      - name: Regenerate declared hsb8 manifest
        run: |
          manifest=$(mktemp)
          nix eval --no-update-lock-file \
            .#nixosConfigurations.hsb8.config.services.hostdash.manifest.generated \
            --json | jq -S . >"$manifest"
          mv "$manifest" hosts/csb1/docker/pharos/manifests/hsb8.json

      - name: Validate schema and target configuration
        run: |
          tests/T08-pharos-host-preferences.sh
          bash tests/T05-hostdash-manifest.sh
          nix eval --no-update-lock-file \
            ".#nixosConfigurations.${PHAROS_HOST}.config.system.build.toplevel.drvPath" \
            >/dev/null

      - name: Create settings pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          add-paths: |
            modules/pharos-host-preferences.json
            hosts/csb1/docker/pharos/manifests/hsb8.json
          branch: automation/pharos-settings-${{ inputs.host }}
          delete-branch: true
          commit-message: "pharos: update ${{ inputs.host }} host settings"
          title: "Pharos: update ${{ inputs.host }} host settings"
          body: |
            Automated safe host-settings request from Pharos.

            Host: `${{ inputs.host }}`
            Request: `${{ inputs.request_id }}`

            This PR changes declarative metadata only. It does not deploy or rebuild a host.
          labels: automated

      - name: Wait for pull request checks
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          check_count=0
          for _ in $(seq 1 30); do
            checks=$(gh pr checks "$PR_NUMBER" --json name,bucket 2>/dev/null || true)
            check_count=$(jq 'length' <<<"${checks:-[]}")
            if ((check_count > 0)); then
              break
            fi
            sleep 2
          done
          if ((check_count == 0)); then
            echo "No pull request checks started" >&2
            exit 1
          fi
          gh pr checks "$PR_NUMBER" --watch --fail-fast --interval 10

      - name: Merge validated pull request
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUMBER" --merge --delete-branch

      - name: Record outcome
        run: |
          if [[ -n "${{ steps.create-pr.outputs.pull-request-number }}" ]]; then
            echo "settings_change=merged" >>"$GITHUB_STEP_SUMMARY"
          else
            echo "settings_change=already_declared" >>"$GITHUB_STEP_SUMMARY"
          fi
