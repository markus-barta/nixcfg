name: Janus staged engine pin check

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/janus-engine-pin-check.yml"
      - "hosts/csb1/docker/docker-compose.yml"
      - "hosts/csb1/docker/janus/nonprod-smoke/README.md"
      - "hosts/csb1/docs/RUNBOOK.md"
      - "justfile"
      - "scripts/janus-engine-pin-check.sh"
  pull_request:
    paths:
      - ".github/workflows/janus-engine-pin-check.yml"
      - "hosts/csb1/docker/docker-compose.yml"
      - "hosts/csb1/docker/janus/nonprod-smoke/README.md"
      - "hosts/csb1/docs/RUNBOOK.md"
      - "justfile"
      - "scripts/janus-engine-pin-check.sh"

permissions:
  contents: read

jobs:
  pin-check:
    name: staged pin matches latest verified release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run staged engine pin drift check
        run: scripts/janus-engine-pin-check.sh
