name: 🔎️ Check flake for all systems

on:
  push:
    branches-ignore:
      # Ignore changes to the flake update workflow, it is handled by the pull_request event
      - update_flake_lock_action
      # Pharos settings branches are evaluated through their pull request.
      - "automation/pharos-settings-*"
    paths-ignore:
      - "docker/**"
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "docker/**"

jobs:
  pharos-rollout:
    name: Pharos fleet release compatibility
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify Pharos beacon healthcheck contract
        run: tests/T20-pharos-beacon-healthcheck.sh

      - name: Reject mixed or mutable Pharos fleet pins
        run: tests/T21-pharos-release-rollout.sh

  check:
    name: 🔎️ Eval flake
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        host:
          # Active hosts only (must match flake.nix nixosConfigurations)
          - hsb0
          - hsb1
          - hsb8
          - gpc0
          - csb0
          - csb1
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run nix eval for ${{ matrix.host }}
        # We don't want to continue on error of the workflow will not fail if one host fails
        # continue-on-error: true
        # CI must be read-only: the local nixhostforge stub is intentionally
        # mutable in flake.lock, so newer Nix versions fail if eval tries to
        # refresh the lock file.
        run: nix eval --no-update-lock-file .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel.drvPath
