name: 📄 Check formatting

on:
  pull_request:

# Cancel superseded runs for the same PR (rapid re-pushes) so obsolete runs are
# cancelled instead of running to a failure that emails the repo owner.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: 📄 Check code formatting with "just format"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🧰 Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          fetch-depth: 0
      - name: ⚙️ Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: 🔒 Cache dependencies
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          # https://app.cachix.org/cache/pbek-nixcfg-devenv
          name: pbek-nixcfg-devenv
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: 🔧 Install devenv.sh
        run: nix profile add nixpkgs#devenv
      - name: 🌳 Check changed-file formatting
        env:
          BASE_REVISION: ${{ github.event.pull_request.base.sha }}
          HEAD_REVISION: ${{ github.event.pull_request.head.sha }}
        run: |
          devenv shell --quiet -- prek run \
            --from-ref "$BASE_REVISION" \
            --to-ref "$HEAD_REVISION"
          git diff --exit-code
